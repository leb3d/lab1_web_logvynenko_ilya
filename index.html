<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="minesweeper-app">
        <header class="header">
            <div class="counter flags-counter">010</div>
            <button class="start-button">🙂</button>
            <div class="counter timer-counter">000</div>
        </header>
        
        <main class="grid">
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            
            <div class="cell open" data-value="1">1</div>
            <div class="cell open" data-value="2">2</div>
            <div class="cell open" data-value="3">3</div>
            <div class="cell open"></div>
            
            <div class="cell closed flag"></div>
            <div class="cell closed flag false-flag"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
            
            <div class="cell open mine"></div>
            <div class="cell open mine clicked"></div>
            <div class="cell closed"></div>
            <div class="cell closed"></div>
        </main>
    </div>
</body>
</html>
